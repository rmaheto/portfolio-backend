server:
  port: 8090

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/portfolio}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD.key}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD.key}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

contact:
  to: rmkaheto4java@gmail.com

recaptcha:
  secretKey: ${GOOGLE_RECAPTCHA_SECRET.key}
  verifyUrl: https://www.google.com/recaptcha/api/siteverify

app:
  backend-base-url: http://localhost:8090
  jwt:
    secret: ${JWT_SECRET.key}
    expiration-ms: 86400000
  aws:
    bucket: portfolio
    region: us-east-1
    resume-key-prefix: resumes/
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD.key}